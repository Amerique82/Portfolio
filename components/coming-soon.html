<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coming Soon ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --hot-pink: #FF2D78;
    --electric-cyan: #00F5FF;
    --acid-yellow: #FFE600;
    --deep-purple: #1A0033;
    --neon-green: #39FF14;
    --lavender: #CC88FF;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep-purple);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    cursor: crosshair;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Grid floor */
  .grid-floor {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 45vh;
    background:
      linear-gradient(transparent 0%, rgba(0,245,255,0.08) 100%),
      repeating-linear-gradient(90deg, rgba(0,245,255,0.15) 0px, transparent 1px, transparent 60px, rgba(0,245,255,0.15) 61px),
      repeating-linear-gradient(0deg, rgba(0,245,255,0.15) 0px, transparent 1px, transparent 40px, rgba(0,245,255,0.15) 41px);
    transform: perspective(500px) rotateX(50deg);
    transform-origin: bottom center;
  }

  /* Sun */
  .sun {
    position: fixed;
    bottom: 35vh;
    left: 50%;
    transform: translateX(-50%);
    width: 220px;
    height: 220px;
    border-radius: 50%;
    background: linear-gradient(180deg, var(--acid-yellow) 0%, var(--hot-pink) 55%, var(--deep-purple) 55%);
    box-shadow: 0 0 60px rgba(255,45,120,0.6), 0 0 120px rgba(255,230,0,0.3);
    z-index: 0;
    overflow: hidden;
  }

  .sun::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      180deg,
      var(--deep-purple) 55%,
      var(--deep-purple) calc(55% + 8px),
      transparent calc(55% + 8px),
      transparent calc(55% + 18px),
      var(--deep-purple) calc(55% + 18px),
      var(--deep-purple) calc(55% + 24px),
      transparent calc(55% + 24px),
      transparent calc(55% + 32px),
      var(--deep-purple) calc(55% + 32px),
      var(--deep-purple) calc(55% + 36px),
      transparent calc(55% + 36px),
      transparent calc(55% + 44px)
    );
    border-radius: 50%;
  }

  /* Stars */
  .stars {
    position: fixed;
    inset: 0;
    z-index: 0;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    animation: twinkle 2s infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.2; transform: scale(0.8); }
    to   { opacity: 1;   transform: scale(1.2); }
  }

  /* Card */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 52px 56px 44px;
    max-width: 600px;
    width: 90%;
    border: 2px solid var(--hot-pink);
    background: rgba(26,0,51,0.82);
    backdrop-filter: blur(4px);
    box-shadow:
      0 0 0 1px rgba(255,45,120,0.3),
      0 0 40px rgba(255,45,120,0.25),
      inset 0 0 40px rgba(204,136,255,0.05);
  }

  .card::before, .card::after {
    content: '✦';
    position: absolute;
    color: var(--acid-yellow);
    font-size: 1.1rem;
    animation: spin 6s linear infinite;
  }
  .card::before { top: 14px; left: 20px; }
  .card::after  { bottom: 14px; right: 20px; animation-direction: reverse; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.35em;
    color: var(--electric-cyan);
    text-transform: uppercase;
    margin-bottom: 18px;
    animation: glitch 4s infinite;
  }

  @keyframes glitch {
    0%, 94%, 100% { text-shadow: none; transform: none; }
    95% { text-shadow: 2px 0 var(--hot-pink), -2px 0 var(--electric-cyan); transform: skewX(1deg); }
    97% { text-shadow: -2px 0 var(--hot-pink), 2px 0 var(--electric-cyan); transform: skewX(-1deg); }
  }

  h1 {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(3rem, 10vw, 5.5rem);
    line-height: 0.95;
    color: var(--acid-yellow);
    text-shadow:
      4px 4px 0 var(--hot-pink),
      8px 8px 0 rgba(255,45,120,0.3);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }

  .subtitle {
    font-family: 'Abril Fatface', serif;
    font-size: clamp(1.2rem, 4vw, 2rem);
    color: var(--lavender);
    text-shadow: 2px 2px 0 var(--hot-pink);
    margin-bottom: 30px;
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 auto 28px;
    width: fit-content;
    color: var(--hot-pink);
    font-size: 0.8rem;
    letter-spacing: 0.2em;
  }
  .divider::before, .divider::after {
    content: '';
    display: block;
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--hot-pink));
  }
  .divider::after { transform: scaleX(-1); }

  .tagline {
    font-size: 0.78rem;
    color: rgba(204,136,255,0.8);
    letter-spacing: 0.08em;
    line-height: 1.8;
    margin-bottom: 36px;
  }
  .tagline em {
    font-style: italic;
    color: var(--electric-cyan);
  }

  /* Email form */
  .form-row {
    display: flex;
    gap: 0;
    max-width: 380px;
    margin: 0 auto 32px;
    border: 1.5px solid var(--hot-pink);
    box-shadow: 0 0 20px rgba(255,45,120,0.3);
  }

  .form-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    padding: 12px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--electric-cyan);
    letter-spacing: 0.05em;
  }
  .form-row input::placeholder { color: rgba(0,245,255,0.35); }

  .form-row button {
    background: var(--hot-pink);
    border: none;
    padding: 12px 20px;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--deep-purple);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .form-row button:hover {
    background: var(--acid-yellow);
  }

  .success-msg {
    display: none;
    font-size: 0.75rem;
    color: var(--neon-green);
    letter-spacing: 0.1em;
    margin-bottom: 32px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn { from { opacity:0; transform: translateY(4px); } to { opacity:1; transform:none; } }

  /* Countdown */
  .countdown {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-bottom: 28px;
  }
  .unit {
    text-align: center;
  }
  .unit .num {
    font-family: 'Abril Fatface', serif;
    font-size: 2.4rem;
    color: var(--acid-yellow);
    text-shadow: 2px 2px 0 var(--hot-pink);
    display: block;
    line-height: 1;
  }
  .unit .label {
    font-size: 0.55rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(204,136,255,0.7);
    margin-top: 4px;
    display: block;
  }
  .sep {
    font-family: 'Abril Fatface', serif;
    font-size: 2rem;
    color: var(--hot-pink);
    align-self: flex-start;
    padding-top: 2px;
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Socials */
  .socials {
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .socials a {
    color: rgba(204,136,255,0.6);
    text-decoration: none;
    transition: color 0.2s;
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
  }
  .socials a:hover {
    color: var(--electric-cyan);
    border-color: var(--electric-cyan);
  }

  /* Decorative corners */
  .corner {
    position: absolute;
    width: 16px;
    height: 16px;
    border-color: var(--electric-cyan);
    border-style: solid;
    opacity: 0.6;
  }
  .corner.tl { top: -2px; left: -2px; border-width: 2px 0 0 2px; }
  .corner.tr { top: -2px; right: -2px; border-width: 2px 2px 0 0; }
  .corner.bl { bottom: -2px; left: -2px; border-width: 0 0 2px 2px; }
  .corner.br { bottom: -2px; right: -2px; border-width: 0 2px 2px 0; }

  /* Floating gems */
  .gems {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }
  .gem {
    position: absolute;
    font-size: 1rem;
    opacity: 0.5;
    animation: float 6s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.4; }
    50%       { transform: translateY(-18px) rotate(180deg); opacity: 0.8; }
  }
</style>
</head>
<body>

<!-- Stars -->
<div class="stars" id="stars"></div>

<!-- Grid floor -->
<div class="grid-floor"></div>

<!-- Sun -->
<div class="sun"></div>

<!-- Floating gems -->
<div class="gems" id="gems"></div>

<!-- Main card -->
<div class="card">
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <p class="eyebrow">// Loading the future //</p>
  <h1>SOMETHING<br>FIERCE</h1>
  <p class="subtitle">is coming for you ◆</p>

  <div class="divider">✦ ✦ ✦</div>

  <p class="tagline">
    Big hair. Bigger dreams.<br>
    <em>She's almost ready.</em> Are you?
  </p>

  <div class="countdown">
    <div class="unit">
      <span class="num" id="d">00</span>
      <span class="label">Days</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <span class="num" id="h">00</span>
      <span class="label">Hrs</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <span class="num" id="m">00</span>
      <span class="label">Min</span>
    </div>
    <span class="sep">:</span>
    <div class="unit">
      <span class="num" id="s">00</span>
      <span class="label">Sec</span>
    </div>
  </div>

  <div class="form-row" id="form-row">
    <input type="email" id="email-input" placeholder="your@email.com" />
    <button onclick="subscribe()">Notify me</button>
  </div>
  <p class="success-msg" id="success">✦ You're on the list, babe ✦</p>

  <div class="socials">
    <a href="#">Instagram</a>
    <a href="#">TikTok</a>
    <a href="#">Newsletter</a>
  </div>
</div>

<script>
  // Stars
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      top:${Math.random()*80}%;
      left:${Math.random()*100}%;
      background:${['#fff','#FFE600','#FF2D78','#00F5FF'][Math.floor(Math.random()*4)]};
      animation-delay:${Math.random()*3}s;
      animation-duration:${1.5+Math.random()*2}s;
    `;
    starsEl.appendChild(s);
  }

  // Gems
  const gemsEl = document.getElementById('gems');
  const GEMS = ['◆','✦','★','◈','❋','✿'];
  const GEM_COLORS = ['#FF2D78','#FFE600','#00F5FF','#CC88FF','#39FF14'];
  for (let i = 0; i < 12; i++) {
    const g = document.createElement('div');
    g.className = 'gem';
    g.textContent = GEMS[Math.floor(Math.random()*GEMS.length)];
    g.style.cssText = `
      top:${5+Math.random()*85}%;
      left:${2+Math.random()*96}%;
      color:${GEM_COLORS[Math.floor(Math.random()*GEM_COLORS.length)]};
      animation-delay:${Math.random()*4}s;
      animation-duration:${4+Math.random()*4}s;
      font-size:${0.7+Math.random()*1.2}rem;
    `;
    gemsEl.appendChild(g);
  }

  // Countdown — target: 60 days from now
  const target = new Date(Date.now() + 60*24*60*60*1000);
  function pad(n){ return String(n).padStart(2,'0'); }
  function tick(){
    const diff = target - Date.now();
    if(diff <= 0){ document.getElementById('d').textContent=document.getElementById('h').textContent=document.getElementById('m').textContent=document.getElementById('s').textContent='00'; return; }
    document.getElementById('d').textContent = pad(Math.floor(diff/86400000));
    document.getElementById('h').textContent = pad(Math.floor(diff%86400000/3600000));
    document.getElementById('m').textContent = pad(Math.floor(diff%3600000/60000));
    document.getElementById('s').textContent = pad(Math.floor(diff%60000/1000));
  }
  tick(); setInterval(tick, 1000);

  // Subscribe
  function subscribe(){
    const val = document.getElementById('email-input').value.trim();
    if(!val || !val.includes('@')) return;
    document.getElementById('form-row').style.display = 'none';
    const msg = document.getElementById('success');
    msg.style.display = 'block';
  }
</script>
</body>
</html>
